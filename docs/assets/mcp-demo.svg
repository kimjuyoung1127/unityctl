<svg xmlns="http://www.w3.org/2000/svg" width="720" height="520">
  <style>
    .t { font-family: 'Cascadia Code', 'JetBrains Mono', 'Fira Code', monospace; font-size: 13px; fill: #cdd6f4; }
    .dim { fill: #6c7086; }
    .teal { fill: #94e2d5; }
    .green { fill: #a6e3a1; }
    .red { fill: #f38ba8; }
    .blue { fill: #89b4fa; }
    .yellow { fill: #f9e2af; }
    .mauve { fill: #cba6f7; }

    .line { opacity: 0; }

    .line:nth-child(1)  { animation: appear 0.01s 0.3s forwards; }
    .line:nth-child(2)  { animation: appear 0.01s 0.8s forwards; }
    .line:nth-child(3)  { animation: appear 0.01s 1.5s forwards; }
    .line:nth-child(4)  { animation: appear 0.01s 2.0s forwards; }
    .line:nth-child(5)  { animation: appear 0.01s 2.7s forwards; }
    .line:nth-child(6)  { animation: appear 0.01s 3.2s forwards; }
    .line:nth-child(7)  { animation: appear 0.01s 3.9s forwards; }
    .line:nth-child(8)  { animation: appear 0.01s 4.4s forwards; }
    .line:nth-child(9)  { animation: appear 0.01s 5.1s forwards; }
    .line:nth-child(10) { animation: appear 0.01s 5.6s forwards; }
    .line:nth-child(11) { animation: appear 0.01s 6.3s forwards; }
    .line:nth-child(12) { animation: appear 0.01s 6.8s forwards; }
    .line:nth-child(13) { animation: appear 0.01s 7.5s forwards; }
    .line:nth-child(14) { animation: appear 0.01s 8.0s forwards; }
    .line:nth-child(15) { animation: appear 0.01s 8.7s forwards; }
    .line:nth-child(16) { animation: appear 0.01s 9.4s forwards; }
    .line:nth-child(17) { animation: appear 0.01s 10.0s forwards; }
    .line:nth-child(18) { animation: appear 0.01s 10.6s forwards; }
    .line:nth-child(19) { animation: appear 0.01s 11.3s forwards; }
    .line:nth-child(20) { animation: appear 0.01s 12.0s forwards; }
    .line:nth-child(21) { animation: appear 0.01s 12.5s forwards; }

    @keyframes appear {
      to { opacity: 1; }
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    .cursor {
      animation: blink 1s step-end infinite;
      fill: #cdd6f4;
    }
  </style>

  <rect width="100%" height="100%" rx="10" fill="#1e1e2e"/>

  <!-- Window chrome -->
  <circle cx="20" cy="18" r="6" fill="#f38ba8"/>
  <circle cx="38" cy="18" r="6" fill="#f9e2af"/>
  <circle cx="56" cy="18" r="6" fill="#a6e3a1"/>
  <text x="360" y="22" text-anchor="middle" font-family="monospace" font-size="13" fill="#6c7086">AI Agent + unityctl MCP</text>

  <g transform="translate(20, 48)">
    <!-- Line 1: User prompt -->
    <g class="line">
      <text x="0" y="0" class="t mauve">User:</text>
      <text x="50" y="0" class="t"> "Build a platformer level with floor, walls, and player"</text>
    </g>

    <!-- Line 2: Agent thinking -->
    <g class="line">
      <text x="0" y="24" class="t dim">Agent: Planning scene structure...</text>
    </g>

    <!-- Line 3: Create scene -->
    <g class="line">
      <text x="0" y="52" class="t blue">unityctl_run</text>
      <text x="110" y="52" class="t"> scene-create --name "Level01"</text>
    </g>

    <!-- Line 4: result -->
    <g class="line">
      <text x="0" y="72" class="t green">  OK</text>
      <text x="30" y="72" class="t dim"> Created scene 'Level01'</text>
    </g>

    <!-- Line 5: Floor -->
    <g class="line">
      <text x="0" y="100" class="t blue">unityctl_run</text>
      <text x="110" y="100" class="t"> mesh-create-primitive --type Plane --name "Floor"</text>
    </g>
    <g class="line">
      <text x="0" y="120" class="t green">  OK</text>
      <text x="30" y="120" class="t dim"> Created Plane primitive 'Floor'</text>
    </g>

    <!-- Line 7: Wall -->
    <g class="line">
      <text x="0" y="148" class="t blue">unityctl_run</text>
      <text x="110" y="148" class="t"> mesh-create-primitive --type Cube --name "Wall"</text>
    </g>
    <g class="line">
      <text x="0" y="168" class="t green">  OK</text>
      <text x="30" y="168" class="t dim"> Created Cube primitive 'Wall'</text>
    </g>

    <!-- Line 9: Player -->
    <g class="line">
      <text x="0" y="196" class="t blue">unityctl_run</text>
      <text x="110" y="196" class="t"> mesh-create-primitive --type Sphere --name "Player"</text>
    </g>
    <g class="line">
      <text x="0" y="216" class="t green">  OK</text>
      <text x="30" y="216" class="t dim"> Created Sphere primitive 'Player'</text>
    </g>

    <!-- Line 11: Rigidbody -->
    <g class="line">
      <text x="0" y="244" class="t blue">unityctl_run</text>
      <text x="110" y="244" class="t"> component-add --target "Player" --type "Rigidbody"</text>
    </g>
    <g class="line">
      <text x="0" y="264" class="t green">  OK</text>
      <text x="30" y="264" class="t dim"> Added Rigidbody to Player</text>
    </g>

    <!-- Line 13: Verify -->
    <g class="line">
      <text x="0" y="296" class="t dim">Agent: Verifying scene...</text>
    </g>

    <!-- Line 14: hierarchy -->
    <g class="line">
      <text x="0" y="320" class="t yellow">unityctl_query</text>
      <text x="125" y="320" class="t"> scene-hierarchy</text>
    </g>
    <g class="line">
      <text x="0" y="340" class="t dim">  Level01: Floor, Wall, Player (Rigidbody)</text>
    </g>

    <!-- Line 16: validate -->
    <g class="line">
      <text x="0" y="368" class="t yellow">unityctl_query</text>
      <text x="125" y="368" class="t"> project-validate</text>
    </g>
    <g class="line">
      <text x="0" y="388" class="t red">  camera: FAIL</text>
      <text x="120" y="388" class="t dim"> "No main camera in active scene"</text>
    </g>

    <!-- Line 18: Fix -->
    <g class="line">
      <text x="0" y="416" class="t blue">unityctl_run</text>
      <text x="110" y="416" class="t"> gameobject-create --name "Main Camera"</text>
    </g>
    <g class="line">
      <text x="0" y="436" class="t blue">unityctl_run</text>
      <text x="110" y="436" class="t"> component-add --type "Camera" + set-tag "MainCamera"</text>
    </g>

    <!-- Line 20: Re-validate -->
    <g class="line">
      <text x="0" y="460" class="t yellow">unityctl_query</text>
      <text x="125" y="460" class="t"> project-validate</text>
    </g>
    <g class="line">
      <text x="0" y="460" class="t green">  valid: true </text>
      <text x="110" y="460" class="t dim"> All 6 checks passed. Level ready!</text>
    </g>
  </g>
</svg>
