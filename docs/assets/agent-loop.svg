<svg xmlns="http://www.w3.org/2000/svg" width="720" height="420">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1e2e"/>
      <stop offset="100%" stop-color="#181825"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#89b4fa"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#a6e3a1"/>
    </marker>
    <marker id="arrowYellow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f9e2af"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f38ba8"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" rx="12" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="360" y="38" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#cdd6f4">AI Agent Automation Loop</text>
  <text x="360" y="58" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="12" fill="#6c7086">unityctl gives agents the ability to plan, execute, verify, and self-correct</text>

  <!-- PLAN box -->
  <rect x="260" y="80" width="200" height="60" rx="10" fill="#313244" stroke="#89b4fa" stroke-width="2" filter="url(#shadow)"/>
  <text x="296" y="107" font-family="'Cascadia Code', monospace" font-size="13" font-weight="700" fill="#89b4fa">1</text>
  <text x="314" y="107" font-family="'Cascadia Code', monospace" font-size="13" font-weight="700" fill="#89b4fa">PLAN</text>
  <text x="280" y="127" font-family="'Cascadia Code', monospace" font-size="10" fill="#6c7086">schema / query / status</text>

  <!-- Arrow Plan → Execute -->
  <line x1="360" y1="140" x2="360" y2="168" stroke="#89b4fa" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- EXECUTE box -->
  <rect x="260" y="170" width="200" height="60" rx="10" fill="#313244" stroke="#a6e3a1" stroke-width="2" filter="url(#shadow)"/>
  <text x="296" y="197" font-family="'Cascadia Code', monospace" font-size="13" font-weight="700" fill="#a6e3a1">2</text>
  <text x="314" y="197" font-family="'Cascadia Code', monospace" font-size="13" font-weight="700" fill="#a6e3a1">EXECUTE</text>
  <text x="280" y="217" font-family="'Cascadia Code', monospace" font-size="10" fill="#6c7086">run / batch (auto rollback)</text>

  <!-- Arrow Execute → Verify -->
  <line x1="360" y1="230" x2="360" y2="258" stroke="#a6e3a1" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- VERIFY box -->
  <rect x="260" y="260" width="200" height="60" rx="10" fill="#313244" stroke="#f9e2af" stroke-width="2" filter="url(#shadow)"/>
  <text x="296" y="287" font-family="'Cascadia Code', monospace" font-size="13" font-weight="700" fill="#f9e2af">3</text>
  <text x="314" y="287" font-family="'Cascadia Code', monospace" font-size="13" font-weight="700" fill="#f9e2af">VERIFY</text>
  <text x="272" y="307" font-family="'Cascadia Code', monospace" font-size="10" fill="#6c7086">validate / diff / screenshot</text>

  <!-- Pass arrow → Done -->
  <line x1="460" y1="290" x2="540" y2="290" stroke="#a6e3a1" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <rect x="545" y="272" width="80" height="36" rx="8" fill="#a6e3a1" fill-opacity="0.15" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="585" y="295" text-anchor="middle" font-family="'Cascadia Code', monospace" font-size="13" font-weight="700" fill="#a6e3a1">DONE</text>
  <text x="500" y="280" font-family="'Cascadia Code', monospace" font-size="10" fill="#a6e3a1">pass</text>

  <!-- Fail arrow → Diagnose -->
  <line x1="360" y1="320" x2="360" y2="348" stroke="#f9e2af" stroke-width="2" marker-end="url(#arrowYellow)"/>

  <!-- DIAGNOSE box -->
  <rect x="260" y="350" width="200" height="60" rx="10" fill="#313244" stroke="#f38ba8" stroke-width="2" filter="url(#shadow)"/>
  <text x="296" y="377" font-family="'Cascadia Code', monospace" font-size="13" font-weight="700" fill="#f38ba8">4</text>
  <text x="314" y="377" font-family="'Cascadia Code', monospace" font-size="13" font-weight="700" fill="#f38ba8">DIAGNOSE</text>
  <text x="272" y="397" font-family="'Cascadia Code', monospace" font-size="10" fill="#6c7086">get-errors / doctor / console</text>
  <text x="462" y="340" font-family="'Cascadia Code', monospace" font-size="10" fill="#f38ba8">fail</text>

  <!-- Loop back arrow: Diagnose → Plan (left side) -->
  <path d="M 260 380 L 160 380 L 160 110 L 258 110" fill="none" stroke="#f38ba8" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrowRed)"/>
  <text x="130" y="250" font-family="'Cascadia Code', monospace" font-size="11" font-weight="600" fill="#f38ba8" transform="rotate(-90, 130, 250)">fix loop</text>

  <!-- Right side labels -->
  <text x="630" y="115" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#45475a">unityctl_schema</text>
  <text x="630" y="205" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#45475a">unityctl_run</text>
  <text x="630" y="295" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#45475a">project-validate</text>
  <text x="630" y="385" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#45475a">script-get-errors</text>
</svg>
