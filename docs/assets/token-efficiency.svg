<svg xmlns="http://www.w3.org/2000/svg" width="620" height="220">
  <defs>
    <linearGradient id="barRed" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f38ba8"/>
      <stop offset="100%" stop-color="#eba0ac"/>
    </linearGradient>
    <linearGradient id="barGreen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a6e3a1"/>
      <stop offset="100%" stop-color="#94e2d5"/>
    </linearGradient>
    <linearGradient id="bgGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1e2e"/>
      <stop offset="100%" stop-color="#181825"/>
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" rx="10" fill="url(#bgGrad2)"/>

  <!-- Title -->
  <text x="310" y="34" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#cdd6f4">MCP Schema Token Cost per Turn</text>
  <text x="310" y="52" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" fill="#6c7086">Tokens spent on tool definitions before the agent can even start reasoning</text>

  <!-- Traditional MCP bar -->
  <text x="26" y="95" font-family="'Cascadia Code', monospace" font-size="12" fill="#bac2de">Traditional MCP</text>
  <text x="26" y="110" font-family="'Cascadia Code', monospace" font-size="10" fill="#6c7086">200 tools</text>
  <rect x="160" y="82" width="400" height="30" rx="6" fill="url(#barRed)" opacity="0.9"/>
  <text x="565" y="102" font-family="'Cascadia Code', monospace" font-size="13" font-weight="700" fill="#f38ba8">~40,000</text>
  <text x="340" y="102" font-family="'Cascadia Code', monospace" font-size="12" font-weight="600" fill="#1e1e2e">40,000 tokens / turn</text>

  <!-- unityctl bar -->
  <text x="26" y="155" font-family="'Cascadia Code', monospace" font-size="12" fill="#bac2de">unityctl MCP</text>
  <text x="26" y="170" font-family="'Cascadia Code', monospace" font-size="10" fill="#6c7086">12 tools</text>
  <rect x="160" y="142" width="5" height="30" rx="3" fill="url(#barGreen)" opacity="0.9"/>
  <text x="172" y="162" font-family="'Cascadia Code', monospace" font-size="13" font-weight="700" fill="#a6e3a1">~480</text>

  <!-- Multiplier badge -->
  <rect x="430" y="138" width="120" height="38" rx="8" fill="#a6e3a1" fill-opacity="0.12" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="490" y="162" text-anchor="middle" font-family="'Cascadia Code', monospace" font-size="16" font-weight="700" fill="#a6e3a1">83x less</text>

  <!-- Footer -->
  <text x="310" y="205" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" fill="#45475a">unityctl loads detailed parameter schemas on-demand via unityctl_schema — not upfront</text>
</svg>
