<svg xmlns="http://www.w3.org/2000/svg" width="620" height="310">
  <defs>
    <linearGradient id="barRed" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f38ba8"/>
      <stop offset="100%" stop-color="#eba0ac"/>
    </linearGradient>
    <linearGradient id="barYellow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f9e2af"/>
      <stop offset="100%" stop-color="#f5c2e7"/>
    </linearGradient>
    <linearGradient id="barGreen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a6e3a1"/>
      <stop offset="100%" stop-color="#94e2d5"/>
    </linearGradient>
    <linearGradient id="bgGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1e2e"/>
      <stop offset="100%" stop-color="#181825"/>
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" rx="10" fill="url(#bgGrad2)"/>

  <!-- Title -->
  <text x="310" y="34" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#cdd6f4">Claude Code Token Cost — Measured Benchmark</text>
  <text x="310" y="52" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" fill="#6c7086">Schema tokens loaded per session before the agent can start reasoning</text>

  <!-- CoplayDev MCP bar -->
  <text x="26" y="95" font-family="'Cascadia Code', monospace" font-size="12" fill="#bac2de">CoplayDev MCP</text>
  <text x="26" y="110" font-family="'Cascadia Code', monospace" font-size="10" fill="#6c7086">30 tools · 45 KB</text>
  <rect x="160" y="82" width="370" height="30" rx="6" fill="url(#barRed)" opacity="0.9"/>
  <text x="340" y="102" font-family="'Cascadia Code', monospace" font-size="12" font-weight="600" fill="#1e1e2e">11,427 tokens / session</text>

  <!-- unityctl MCP bar -->
  <text x="26" y="155" font-family="'Cascadia Code', monospace" font-size="12" fill="#bac2de">unityctl MCP</text>
  <text x="26" y="170" font-family="'Cascadia Code', monospace" font-size="10" fill="#6c7086">12 tools · 5 KB</text>
  <rect x="160" y="142" width="41" height="30" rx="6" fill="url(#barYellow)" opacity="0.9"/>
  <text x="208" y="162" font-family="'Cascadia Code', monospace" font-size="13" font-weight="700" fill="#f9e2af">1,256</text>

  <!-- unityctl via Bash bar -->
  <text x="26" y="215" font-family="'Cascadia Code', monospace" font-size="12" fill="#bac2de">unityctl via Bash</text>
  <text x="26" y="230" font-family="'Cascadia Code', monospace" font-size="10" fill="#6c7086">131 commands · 0 KB</text>
  <rect x="160" y="202" width="3" height="30" rx="1.5" fill="url(#barGreen)" opacity="0.9"/>
  <text x="170" y="222" font-family="'Cascadia Code', monospace" font-size="13" font-weight="700" fill="#a6e3a1">0</text>

  <!-- Multiplier badges -->
  <rect x="420" y="138" width="100" height="38" rx="8" fill="#f9e2af" fill-opacity="0.12" stroke="#f9e2af" stroke-width="1.5"/>
  <text x="470" y="162" text-anchor="middle" font-family="'Cascadia Code', monospace" font-size="16" font-weight="700" fill="#f9e2af">9x less</text>

  <rect x="420" y="198" width="160" height="38" rx="8" fill="#a6e3a1" fill-opacity="0.12" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="500" y="222" text-anchor="middle" font-family="'Cascadia Code', monospace" font-size="16" font-weight="700" fill="#a6e3a1">zero overhead</text>

  <!-- Cumulative cost comparison -->
  <line x1="26" y1="252" x2="594" y2="252" stroke="#313244" stroke-width="1"/>
  <text x="310" y="272" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#a6adc8">Cumulative: 5 QA operations × 1 session</text>

  <text x="80" y="295" text-anchor="end" font-family="'Cascadia Code', monospace" font-size="11" fill="#6c7086">CoplayDev</text>
  <rect x="90" y="283" width="200" height="16" rx="4" fill="url(#barRed)" opacity="0.7"/>
  <text x="296" y="295" font-family="'Cascadia Code', monospace" font-size="11" font-weight="600" fill="#f38ba8">12,158 tok</text>

  <text x="80" y="295" text-anchor="end" font-family="'Cascadia Code', monospace" font-size="11" fill="#6c7086" dy="18">unityctl</text>
  <rect x="90" y="301" width="29" height="16" rx="4" fill="url(#barGreen)" opacity="0.7"/>
  <text x="125" y="313" font-family="'Cascadia Code', monospace" font-size="11" font-weight="600" fill="#a6e3a1">1,780 tok</text>
  <text x="210" y="313" font-family="'Cascadia Code', monospace" font-size="11" font-weight="700" fill="#94e2d5">— 6.8x cheaper</text>
</svg>
